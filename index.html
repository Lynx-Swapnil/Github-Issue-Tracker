<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/style.css">

</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <!-- Login Container -->
    <div class="card w-96 bg-white shadow-xl">
        <div class="card-body items-center text-center">
            <!-- GitHub Logo -->
            <div class="mb-2">
                <img src="assets/github-logo.png" alt="">
            </div>
            
            <!-- Title -->
            <h1 class="text-2xl font-semibold text-gray-800 mb-1">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mb-4">Sign in to manage your issues</p>
            
            <!-- Login Form -->
            <form class="w-full text-left" id="loginForm">
                <!-- Username Field -->
                <div class="form-control w-full mb-2">
                    <label class="label">
                        <span class="label-text font-medium text-gray-900">Username</span>
                    </label>
                    <input 
                        type="text" 
                        placeholder="Enter Username" 
                        class="input input-bordered w-full" 
                        id="username"
                    />
                    <label class="label">
                        <span class="label-text-alt text-blue-600">Default: admin</span>
                    </label>
                </div>
                
                <!-- Password Field -->
                <div class="form-control w-full mb-3">
                    <label class="label">
                        <span class="label-text font-medium text-gray-900">Password</span>
                    </label>
                    <input 
                        type="password" 
                        placeholder="Enter Password" 
                        class="input input-bordered w-full" 
                        id="password"
                    />
                    <label class="label">
                        <span class="label-text-alt text-blue-600">Default: admin123</span>
                    </label>
                </div>
                
                <!-- Sign In Button -->
                <button type="submit" class="btn w-full text-white mb-2" style="background-color: #7c3aed;">
                    Sign In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="divider text-sm">OR</div>
            
            <!-- Demo Credentials -->
                <p class="text-sm text-gray-400 mb-1 font-medium">Demo Credentials:</p>
            <div class="bg-gray-50 rounded-lg p-3 w-full">
               
                <p class="text-sm text-gray-800"><span class="font-semibold">Username:</span> admin</p>
                <p class="text-sm text-gray-800"><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </div>
    
    <script src="scripts/index.js"></script>
</body>
</html>
